<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <!-- Load static files -->
    {% load static %}
    <!-- Link your CSS file -->
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
    <!-- Include Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>User Registration</h1>
        <form method="post" class="registration-form">
            {% csrf_token %}
            {{ form.as_p }}
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit" class="btn register-btn">Register</button>
        </form>
        <p>Login, if already Registered.</p>
        <a href="{% url 'user_login' %}" ><button class="btn login-btn">Login</button></a>
        <br>
        <br>
        <a href="{% url 'home' %}"><button class="btn home-btn">Home</button></a>
    </div>

    <!-- Add a background animation -->
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
</body>
</html>
