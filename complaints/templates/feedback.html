<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <!-- Load static files -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/feedback.css' %}">
    <!-- Include Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Feedback for {{ complaint.title }}</h1>
        <form method="post" class="feedback-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_feedback_text">Feedback:</label>
                {{ form.feedback_text }}
            </div>
            <button type="submit" class="btn submit-btn">Submit Feedback</button>
        </form>
        <br>
        <a href="{% url 'complaint_list' %}" class="btn view-btn">View Complaints</a>
    </div>

    <!-- Add a background animation -->
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
</body>
</html>
