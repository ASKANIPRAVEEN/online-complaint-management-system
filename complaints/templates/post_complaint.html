<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Complaint</title>
    <!-- Load static files -->
    {% load static %}
    <!-- Link your CSS file -->
    <link rel="stylesheet" href="{% static 'css/post_complaint.css' %}">
    <!-- Include Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Post Complaint</h1>
        <form method="post" enctype="multipart/form-data" class="complaint-form">
            {% csrf_token %}
            
            <!-- Title -->
            <div class="form-group">
                <label for="id_title">Title:</label>
                <input type="text" name="title" id="id_title" value="{{ form.title.value|default:'' }}" required>
            </div>
            
            <!-- Description -->
            <div class="form-group">
                <label for="id_description">Description:</label>
                <textarea name="description" id="id_description" required>{{ form.description.value|default:'' }}</textarea>
            </div>
            
            <!-- Location -->
            <div class="form-group">
                <label for="id_location">Location:</label>
                <input type="text" name="location" id="id_location" value="{{ form.location.value|default:'' }}" required>
            </div>
            
            <!-- Document Upload -->
            <div class="form-group file-input">
                <label for="id_document">Upload Document</label>
                <input type="file" name="document" id="id_document" onchange="updateFileName('document')">
                <span class="file-name" id="document-name">No file chosen</span>
            </div>
            
            <!-- Image Upload -->
            <div class="form-group file-input">
                <label for="id_image">Upload Image</label>
                <input type="file" name="image" id="id_image" onchange="updateFileName('image')">
                <span class="file-name" id="image-name">No file chosen</span>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn submit-btn">Submit Complaint</button>
        </form>
        <p>You can view your complaints, if you are already posted.</p>
        <br>
        <div class="back">
            <a href="{% url 'user_login' %}" class="btn back-btn">Back</a>
            &nbsp;
            <a href="{% url 'complaint_list' %}" class="btn view-btn">View Complaints</a>
        </div>
    </div>

    <!-- Add a background animation -->
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Link your JavaScript file -->
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
